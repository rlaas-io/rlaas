name: SDK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.1.1). Optional for manual runs; defaults to current ref if omitted."
        required: false
        default: ""
        type: string
      publish_python:
        description: Publish Python SDK to PyPI
        required: true
        default: true
        type: boolean
      publish_typescript:
        description: Publish TypeScript SDK to npm
        required: true
        default: true
        type: boolean
      publish_nodejs:
        description: Publish Node.js SDK to npm
        required: true
        default: true
        type: boolean
      publish_java:
        description: Publish Java SDK to GitHub Packages Maven
        required: true
        default: true
        type: boolean
      publish_dotnet:
        description: Publish .NET SDK to NuGet
        required: true
        default: true
        type: boolean
      publish_ruby:
        description: Publish Ruby SDK to RubyGems
        required: true
        default: true
        type: boolean
      publish_rust:
        description: Publish Rust SDK to crates.io
        required: true
        default: true
        type: boolean
      publish_cpp:
        description: Build and publish C++ SDK archive to GitHub Release assets
        required: true
        default: true
        type: boolean
      dry_run:
        description: Build/pack only, do not publish
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  release:
    if: github.actor == 'suresh-p26'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authorize actor (CODEOWNERS only)
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          if [[ ! -f .github/CODEOWNERS ]]; then
            echo "Missing .github/CODEOWNERS"
            exit 1
          fi

          owners=$(awk '
            /^[[:space:]]*#/ {next}
            NF >= 2 {
              for (i = 2; i <= NF; i++) {
                gsub(/^@/, "", $i)
                print $i
              }
            }
          ' .github/CODEOWNERS | sort -u)

          echo "CODEOWNERS principals:"
          echo "$owners"

          if echo "$owners" | grep -qx "$ACTOR"; then
            echo "Actor $ACTOR authorized by CODEOWNERS"
            exit 0
          fi

          echo "Actor $ACTOR is not listed in CODEOWNERS and cannot run SDK release workflow"
          exit 1

      - name: Resolve release switches and tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            if [[ -z "$tag" ]]; then
              if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
                tag="${GITHUB_REF_NAME}"
              else
                echo "Manual run requires inputs.tag when not running from a tag ref"
                exit 1
              fi
            fi

            echo "PUBLISH_PYTHON=${{ inputs.publish_python }}" >> "$GITHUB_ENV"
            echo "PUBLISH_TYPESCRIPT=${{ inputs.publish_typescript }}" >> "$GITHUB_ENV"
            echo "PUBLISH_NODEJS=${{ inputs.publish_nodejs }}" >> "$GITHUB_ENV"
            echo "PUBLISH_JAVA=${{ inputs.publish_java }}" >> "$GITHUB_ENV"
            echo "PUBLISH_DOTNET=${{ inputs.publish_dotnet }}" >> "$GITHUB_ENV"
            echo "PUBLISH_RUBY=${{ inputs.publish_ruby }}" >> "$GITHUB_ENV"
            echo "PUBLISH_RUST=${{ inputs.publish_rust }}" >> "$GITHUB_ENV"
            echo "PUBLISH_CPP=${{ inputs.publish_cpp }}" >> "$GITHUB_ENV"
            echo "DRY_RUN=${{ inputs.dry_run }}" >> "$GITHUB_ENV"
          else
            tag="${GITHUB_REF_NAME}"
            echo "PUBLISH_PYTHON=true" >> "$GITHUB_ENV"
            echo "PUBLISH_TYPESCRIPT=true" >> "$GITHUB_ENV"
            echo "PUBLISH_NODEJS=true" >> "$GITHUB_ENV"
            echo "PUBLISH_JAVA=true" >> "$GITHUB_ENV"
            echo "PUBLISH_DOTNET=true" >> "$GITHUB_ENV"
            echo "PUBLISH_RUBY=true" >> "$GITHUB_ENV"
            echo "PUBLISH_RUST=true" >> "$GITHUB_ENV"
            echo "PUBLISH_CPP=true" >> "$GITHUB_ENV"
            echo "DRY_RUN=false" >> "$GITHUB_ENV"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9]+)*$ ]]; then
            echo "Invalid tag: $tag. Expected vX.Y.Z or pre-release variants."
            exit 1
          fi

          version="${tag#v}"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "SDK_VERSION=$version" >> "$GITHUB_ENV"
          echo "Using SDK version $version from tag $tag"

      - name: Setup Python
        if: env.PUBLISH_PYTHON == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and publish Python SDK
        if: env.PUBLISH_PYTHON == 'true'
        shell: bash
        env:
          PYPI_API_TOKEN: ${{ secrets['PYPI_API_TOKEN'] }}
        run: |
          set -euo pipefail
          cd sdk/python

          python -m pip install --upgrade pip build twine

          python - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          text = re.sub(r'(?m)^version\s*=\s*"[^"]+"', f'version = "{os.environ["SDK_VERSION"]}"', text)
          path.write_text(text, encoding="utf-8")
          PY

          python -m build
          twine check dist/*

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "dry_run=true, skipping PyPI upload"
            exit 0
          fi

          if [[ -z "${PYPI_API_TOKEN:-}" ]]; then
            echo "Missing secret: PYPI_API_TOKEN"
            exit 1
          fi
          twine upload -u __token__ -p "${PYPI_API_TOKEN}" dist/*

      - name: Setup Node
        if: env.PUBLISH_TYPESCRIPT == 'true' || env.PUBLISH_NODEJS == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Build and publish TypeScript SDK
        if: env.PUBLISH_TYPESCRIPT == 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets['NPM_TOKEN'] }}
        run: |
          set -euo pipefail
          cd sdk/typescript

          npm ci
          npm version "${SDK_VERSION}" --no-git-tag-version
          npm run build

          if [[ "$DRY_RUN" == "true" ]]; then
            npm pack
            echo "dry_run=true, skipping npm publish"
            exit 0
          fi

          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "Missing secret: NPM_TOKEN"
            exit 1
          fi
          npm publish --access public

      - name: Build and publish Node.js SDK
        if: env.PUBLISH_NODEJS == 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets['NPM_TOKEN'] }}
        run: |
          set -euo pipefail
          cd sdk/nodejs

          npm version "${SDK_VERSION}" --no-git-tag-version

          if [[ "$DRY_RUN" == "true" ]]; then
            npm pack
            echo "dry_run=true, skipping npm publish"
            exit 0
          fi

          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "Missing secret: NPM_TOKEN"
            exit 1
          fi
          npm publish --access public

      - name: Setup Java
        if: env.PUBLISH_JAVA == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build and publish Java SDK (GitHub Packages Maven)
        if: env.PUBLISH_JAVA == 'true'
        shell: bash
        env:
          MAVEN_USERNAME: ${{ secrets['MAVEN_USERNAME'] }}
          MAVEN_PASSWORD: ${{ secrets['MAVEN_PASSWORD'] }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          cd sdk/java

          mvn -B -q versions:set -DnewVersion="${SDK_VERSION}" -DgenerateBackupPoms=false
          mvn -B -q -DskipTests package

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "dry_run=true, skipping Maven publish"
            exit 0
          fi

          MAVEN_USERNAME="${MAVEN_USERNAME:-${GITHUB_ACTOR}}"
          MAVEN_PASSWORD="${MAVEN_PASSWORD:-${GITHUB_TOKEN}}"

          if [[ -z "${MAVEN_USERNAME:-}" || -z "${MAVEN_PASSWORD:-}" ]]; then
            echo "Missing credentials for Maven publish (MAVEN_* secrets or default GITHUB_TOKEN unavailable)"
            exit 1
          fi

          cat > /tmp/settings.xml <<'XML'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.MAVEN_USERNAME}</username>
                <password>${env.MAVEN_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          XML

          mvn -B -q -s /tmp/settings.xml -DskipTests deploy \
            -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/rlaas-io/rlaas

      - name: Setup .NET
        if: env.PUBLISH_DOTNET == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build and publish .NET SDK
        if: env.PUBLISH_DOTNET == 'true'
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets['NUGET_API_KEY'] }}
        run: |
          set -euo pipefail
          cd sdk/dotnet/Rlaas.Sdk

          dotnet restore
          dotnet pack -c Release -p:PackageVersion="${SDK_VERSION}" -p:Version="${SDK_VERSION}"

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "dry_run=true, skipping NuGet publish"
            exit 0
          fi

          if [[ -z "${NUGET_API_KEY:-}" ]]; then
            echo "Missing secret: NUGET_API_KEY"
            exit 1
          fi
          dotnet nuget push bin/Release/*.nupkg --source https://api.nuget.org/v3/index.json --api-key "${NUGET_API_KEY}" --skip-duplicate

      - name: Setup Ruby
        if: env.PUBLISH_RUBY == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build and publish Ruby SDK
        if: env.PUBLISH_RUBY == 'true'
        shell: bash
        env:
          RUBYGEMS_API_KEY: ${{ secrets['RUBYGEMS_API_KEY'] }}
        run: |
          set -euo pipefail
          cd sdk/ruby

          sed -i -E "s/spec.version\s*=\s*\"[^\"]+\"/spec.version       = \"${SDK_VERSION}\"/" rlaas_sdk.gemspec
          gem build rlaas_sdk.gemspec

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "dry_run=true, skipping RubyGems publish"
            exit 0
          fi

          if [[ -z "${RUBYGEMS_API_KEY:-}" ]]; then
            echo "Missing secret: RUBYGEMS_API_KEY"
            exit 1
          fi

          mkdir -p ~/.gem
          cat > ~/.gem/credentials <<EOF
          ---
          :rubygems_api_key: ${RUBYGEMS_API_KEY}
          EOF
          chmod 0600 ~/.gem/credentials

          gem push "rlaas-sdk-${SDK_VERSION}.gem"

      - name: Setup Rust
        if: env.PUBLISH_RUST == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build and publish Rust SDK
        if: env.PUBLISH_RUST == 'true'
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets['CARGO_REGISTRY_TOKEN'] }}
        run: |
          set -euo pipefail
          cd sdk/rust

          sed -i -E "s/^version\s*=\s*\"[^\"]+\"/version     = \"${SDK_VERSION}\"/" Cargo.toml
          cargo package --allow-dirty

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "dry_run=true, skipping crates.io publish"
            exit 0
          fi

          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "Missing secret: CARGO_REGISTRY_TOKEN"
            exit 1
          fi
          cargo publish --allow-dirty

      - name: Setup C++ toolchain
        if: env.PUBLISH_CPP == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ libcurl4-openssl-dev

      - name: Build and package C++ SDK
        if: env.PUBLISH_CPP == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd sdk/cpp

          sed -i -E "s/project\(rlaas_sdk VERSION [0-9]+\.[0-9]+\.[0-9]+/project(rlaas_sdk VERSION ${SDK_VERSION}/" CMakeLists.txt

          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          cmake --install build --prefix dist

          archive="rlaas-cpp-sdk-${SDK_VERSION}-linux-x64.tar.gz"
          tar -C dist -czf "$archive" .
          mkdir -p "$GITHUB_WORKSPACE/sdk-artifacts"
          mv "$archive" "$GITHUB_WORKSPACE/sdk-artifacts/"

      - name: Upload C++ package artifact
        if: env.PUBLISH_CPP == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cpp-sdk-${{ env.SDK_VERSION }}
          path: sdk-artifacts/rlaas-cpp-sdk-${{ env.SDK_VERSION }}-linux-x64.tar.gz

      - name: Publish C++ package to GitHub Release assets
        if: env.PUBLISH_CPP == 'true' && env.DRY_RUN != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            sdk-artifacts/rlaas-cpp-sdk-${{ env.SDK_VERSION }}-linux-x64.tar.gz